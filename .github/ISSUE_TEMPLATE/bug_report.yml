name: Issue:Bug
description: Report a bug or problem in sqeleton
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: A clear and concise description of the bug.
    validations:
      required: true 

  - type: markdown
    attributes:
      value: "---"

  - type: markdown
    attributes:
      value: Explain how to reproduce the bug or problem.

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe the steps to reproduce the bug.
      placeholder: "1. Run ...\n 2. Execute ...\n 3. Observe ..."
    validations:
      required: true
  
  - type: textarea
    id: code
    attributes:
      label: code
      description: Paste code here.
      render: python
    validations:
      required: false
  
  - type: textarea
    id: log
    attributes:
      label: log
      description: Paste long log.
      render: shell
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: describe expected behavior.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: addtional
    attributes:
      label: Addtional Context
      description: Any other context.
    validations:
      required: false
