name: Lint

run-name: Lint

on:
  push:
    paths:
      - ".github/**/*.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, document-start: disable, truthy: disable, comments-indentation: disable}}" .github

      - name: Install actionlint
        uses: rhysd/actionlint@v1
