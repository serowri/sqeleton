name: PythonCI

run-name: pythonlint & pytest

on:
  push:
    paths:
      - "**/*.py"
  workflow_dispatch:

jobs:
  PythonCI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pip
        run: |
          python -m pip install --upgrade pip

      - name: Set up pythonlint
        run: |
          pip install numpy
          pip install flake8

      - name: Run pythonlint
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up uv
        run: |
          pip install uv
          uv sync --all-extras --frozen

      - name: Run pytest
        run: |
          uv run pytest -v
